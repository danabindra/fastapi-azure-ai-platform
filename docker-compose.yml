version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_SHA: "${GIT_SHA:-dev}"
    image: governance-starter:local
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      LOG_LEVEL: DEBUG
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/governance
      USE_KEYVAULT: "false"
      AUTH_ENABLED: "false"
      OTEL_SERVICE_NAME: governance-starter
      # Uncomment to send traces to a local OTLP collector:
      # OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    volumes:
      # Hot-reload in local dev
      - ./app:/app/app:ro

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: governance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d governance"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
